name: Build Mac Reproductor

on:
  workflow_dispatch:
  push:
    paths:
      - "07_APP_MAC_REPRODUCTOR/**"
      - ".github/workflows/build-mac-reproductor.yml"

jobs:
  build-mac:
    name: Build macOS DMG and ZIP
    runs-on: macos-latest

    defaults:
      run:
        working-directory: 07_APP_MAC_REPRODUCTOR/reproductor-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build macOS app
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AG-Albums360-Desktop-macOS
          path: |
            07_APP_MAC_REPRODUCTOR/reproductor-mac/dist/*.dmg
            07_APP_MAC_REPRODUCTOR/reproductor-mac/dist/*.zip
            07_APP_MAC_REPRODUCTOR/reproductor-mac/dist/*.blockmap
          if-no-files-found: error
